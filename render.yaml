services:
  - type: web
    name: ckg-agentforce
    runtime: python
    buildCommand: pip install -e ".[serve]"
    startCommand: python -m ckg_agentforce.serve
    plan: free
    envVars:
      - key: PORT
        generateValue: true
      - key: POSTHOG_KEY
        sync: false
      - key: RESEND_KEY
        sync: false
